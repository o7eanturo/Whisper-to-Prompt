name: Release macOS app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.2.0"
        required: true
        default: "v1.2.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build DMG
        run: Scripts/create-release-dmg.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" dist/Whisper-to-Prompt-*.dmg \
            --title "Whisper to Prompt $RELEASE_TAG" \
            --generate-notes
