name: Release macOS app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: Scripts/create-release-dmg.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/Whisper-to-Prompt-*.dmg \
            --title "Whisper to Prompt $GITHUB_REF_NAME" \
            --generate-notes
